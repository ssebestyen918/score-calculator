<div class="title-bar">
    <div class="left">
        <h3>{{title()}}</h3>
        <div class="games pill"> {{getGameCount()}}/{{gameCount()}} games</div>
    </div>
    <div class="right">Payout per game:  <div class="payout pill">${{payout()}}</div></div>
</div>

<div class="games-container">
    @for (game of games(); track $index) {
        <app-game [game]="game" (winnerEvent)="addGameWinner($event)"></app-game>
    }
</div>
